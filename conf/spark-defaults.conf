# Spark defaults for the billups medallion pipeline.
#
# These mirror what billups_pipeline.session.build_spark() sets programmatically,
# so that spark-submit, the Spark shell, and Jupyter all get the same Iceberg
# wiring even when they don't go through our SparkSession builder ("parity").
#
# NOTE: the very first run downloads the Iceberg runtime jar from Maven Central
# (needs outbound internet); it is cached afterwards under ~/.ivy2.

# Iceberg runtime jar matched to Spark 3.5.x / Scala 2.12.
spark.jars.packages org.apache.iceberg:iceberg-spark-runtime-3.5_2.12:1.9.1

# Enable Iceberg SQL extensions (MERGE INTO, time travel, etc.).
spark.sql.extensions org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions

# The "billups" catalog, backed by a hadoop (filesystem) warehouse that every
# container shares through the named "warehouse" Docker volume.
spark.sql.catalog.billups org.apache.iceberg.spark.SparkCatalog
spark.sql.catalog.billups.type hadoop
spark.sql.catalog.billups.warehouse /opt/billups/warehouse

# Adaptive query execution (good defaults for skewed retail-style aggregations).
spark.sql.adaptive.enabled true
spark.sql.adaptive.coalescePartitions.enabled true

# Make files/dirs Iceberg writes world-writable so the Airflow driver (uid 50000)
# and Spark executors (uid 185) can share the one warehouse volume.
spark.hadoop.fs.permissions.umask-mode 000
